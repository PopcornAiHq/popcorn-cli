name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          prev=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          notes=$(git log --pretty=format:"- %s" "${{ steps.prev.outputs.tag }}..${{ github.ref_name }}" | grep -v "^- chore:")
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "${{ steps.notes.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
